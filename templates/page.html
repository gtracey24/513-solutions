<script>
document.addEventListener('DOMContentLoaded', function () {

  // Close all open collapses when clicking outside any card
  document.addEventListener('click', function (e) {
    if (!e.target.closest('.service-card')) {
      document.querySelectorAll('.collapse.show').forEach(function (openItem) {
        let collapse = bootstrap.Collapse.getInstance(openItem);
        if (collapse) collapse.hide();
      });
    }
  });

  // Close other cards when opening a new one
  document.querySelectorAll('.service-card').forEach(function (card) {
    card.addEventListener('click', function () {
      const target = card.getAttribute('data-bs-target');

      document.querySelectorAll('.collapse.show').forEach(function (openItem) {
        if ('#' + openItem.id !== target) {
          let collapse = bootstrap.Collapse.getInstance(openItem);
          if (collapse) collapse.hide();
        }
      });
    });
  });

});
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {

  document.querySelectorAll('.service-card').forEach(card => {
    const collapseId = card.getAttribute('data-bs-target');
    const collapseEl = document.querySelector(collapseId);
    const bg = card.getAttribute('data-bg');

    collapseEl.addEventListener('show.bs.collapse', () => {
      card.style.backgroundImage = `url('${bg}')`;
      card.classList.add('bg-active');
    });

    collapseEl.addEventListener('hide.bs.collapse', () => {
      card.style.backgroundImage = '';
      card.classList.remove('bg-active');
    });
  });

});
</script>
