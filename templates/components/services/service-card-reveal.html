<div class="col-md-6 mb-4">
  <div class="card h-100 p-4 shadow-sm service-card">

    <button class="btn w-100 d-flex justify-content-between align-items-center service-toggle"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#description-{{SERVICE_ID}}">

      <h2 class="card-title mb-0" style="font-size: 1.9rem;">
        {{SERVICE_TITLE}}
      </h2>

      <span class="chevron">
        <i class="bi bi-chevron-down"></i>
      </span>

    </button>

    <div class="collapse mt-3" id="description-{{SERVICE_ID}}">
      <p>{{SERVICE_DESCRIPTION}}</p>

      <ul>
        {{SERVICE_FOCUS}}
      </ul>
    </div>

  </div>
</div>
