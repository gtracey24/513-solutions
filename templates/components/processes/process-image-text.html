<div class="col-md-4 mb-4">
  <div class="sf-process-card h-100">
    
    <!-- Top Image -->
    <div class="sf-process-card-img">
      <img src="{{PROCESS_IMAGE}}" alt="{{PROCESS_TITLE}}">
    </div>

    <!-- Frosted Bottom -->
    <div class="sf-process-card-body">
      <h3 class="sf-process-card-title">{{PROCESS_TITLE}}</h3>
      <p class="sf-process-card-text">{{PROCESS_DESCRIPTION}}</p>
    </div>

  </div>
</div>
